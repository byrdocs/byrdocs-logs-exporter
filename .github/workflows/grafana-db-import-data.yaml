name: Grafana DB Import Data

on:
  workflow_dispatch:

jobs:
  import-data:
    runs-on: ubuntu-latest
    steps:
      - name: Call import endpoint
        env:
          EXPORTER_SITE_TOKEN: ${{ secrets.EXPORTER_SITE_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${EXPORTER_SITE_TOKEN}" ]; then
            echo "Missing required secret: EXPORTER_SITE_TOKEN"
            exit 1
          fi

          response_with_status="$(curl --silent --show-error \
            --write-out "\n%{http_code}" \
            "https://byrdocs-logs-exporter.cpphusky.workers.dev/import" \
            -H "authorization: Bearer ${EXPORTER_SITE_TOKEN}")"

          http_status="${response_with_status##*$'\n'}"
          response="${response_with_status%$'\n'*}"

          echo "HTTP status: ${http_status}"
          echo "Response: ${response:-<empty>}"

          ok="$(printf '%s' "${response}" | jq -r '.ok // false' 2>/dev/null || printf 'false')"
          if [ "${http_status}" -lt 200 ] || [ "${http_status}" -ge 300 ] || [ "${ok}" != "true" ]; then
            echo "Import failed (status=${http_status}, ok=${ok})"
            exit 1
          fi
